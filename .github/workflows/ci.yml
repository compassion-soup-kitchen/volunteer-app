name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://user:pass@localhost:5432/db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-placeholder-secret
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      FACEBOOK_CLIENT_ID: ci-placeholder
      FACEBOOK_CLIENT_SECRET: ci-placeholder
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
